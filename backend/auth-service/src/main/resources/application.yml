server:
  port: 8081

spring:
  application:
    name: auth-service
  config:
    import: "optional:configserver:http://localhost:8888"

  # MED-12: Credentials from environment variables (no hardcoded values)
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/auth_db?useSSL=false&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:edtech_user}
    password: ${SPRING_DATASOURCE_PASSWORD:edtech_password}
  jpa:
    hibernate:
      ddl-auto: update
    # LOW-01: show-sql disabled to prevent credential leakage in logs
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

  # HIGH-07: Kafka for publishing user-registration events
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      properties:
        max.block.ms: 1000 # Don't block for 60s if Kafka is down, fail fast after 1s

# CRIT-01: JWT secret from environment variable only — no hardcoded fallback
jwt:
  secret: ${JWT_SECRET}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE:http://localhost:8761/eureka/}
    fetch-registry: true
    register-with-eureka: true
